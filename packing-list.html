<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Packing List</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', Courier, monospace;
      background: #0c0c0c;
      color: #33ff33;
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
      text-shadow: 0 0 8px #33ff3388;
    }

    h1::before { content: '> '; opacity: 0.5; }

    .subtitle {
      font-size: 0.8rem;
      color: #33ff3377;
      margin-bottom: 24px;
      padding-left: 16px;
    }

    .add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .add-form input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #33ff3355;
      border-radius: 2px;
      font-size: 0.95rem;
      font-family: inherit;
      background: #0c0c0c;
      color: #33ff33;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
    }

    .add-form input::placeholder { color: #33ff3344; }

    .add-form input:focus {
      border-color: #33ff33;
      box-shadow: 0 0 6px #33ff3344;
    }

    .add-form button {
      padding: 10px 18px;
      background: #33ff3322;
      color: #33ff33;
      border: 1px solid #33ff3355;
      border-radius: 2px;
      font-size: 1.2rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
      line-height: 1;
    }

    .add-form button:hover {
      background: #33ff3333;
      box-shadow: 0 0 8px #33ff3344;
    }

    .add-form button:active { transform: scale(0.95); }

    .section { margin-bottom: 20px; }

    .section-label {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #33ff3366;
      margin-bottom: 6px;
      padding-left: 2px;
    }

    .section-label::before { content: '-- '; }
    .section-label::after  { content: ' --'; }

    .list {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #111;
      padding: 12px 14px;
      border: 1px solid #33ff3322;
      border-radius: 2px;
      transition: border-color 0.15s, opacity 0.15s;
    }

    .item:hover { border-color: #33ff3355; }

    .item.packed { opacity: 0.4; }

    .item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #33ff33;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-label {
      flex: 1;
      font-size: 0.95rem;
      cursor: pointer;
      word-break: break-word;
    }

    .item-label::before { content: '> '; opacity: 0.4; }

    .item.packed .item-label {
      text-decoration: line-through;
      text-decoration-color: #33ff3388;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #33ff3344;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 2px;
      line-height: 1;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: #ff4444; text-shadow: 0 0 6px #ff444488; }

    .empty {
      text-align: center;
      color: #33ff3344;
      font-size: 0.85rem;
      padding: 32px 0;
    }

    .empty::before { content: '// '; }

    .footer-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .footer-actions button {
      flex: 1;
      padding: 9px 6px;
      font-size: 0.75rem;
      font-family: inherit;
      font-weight: 500;
      border: 1px solid #33ff3333;
      background: transparent;
      border-radius: 2px;
      cursor: pointer;
      color: #33ff3377;
      transition: border-color 0.15s, color 0.15s;
    }

    .footer-actions button:hover { border-color: #33ff3366; color: #33ff33; }
    .footer-actions button.danger:hover { border-color: #ff4444; color: #ff4444; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Packing List</h1>
    <div class="subtitle" id="subtitle">0 items</div>

    <form class="add-form" id="addForm">
      <input type="text" id="itemInput" placeholder="Add an item…" autocomplete="off" autocorrect="off">
      <button type="submit">+</button>
    </form>

    <div id="unpacked-section" class="section" style="display:none">
      <div class="section-label">To pack</div>
      <div class="list" id="unpackedList"></div>
    </div>

    <div id="packed-section" class="section" style="display:none">
      <div class="section-label">Packed</div>
      <div class="list" id="packedList"></div>
    </div>

    <div id="emptyState" class="empty">No items yet — add something above</div>

    <div class="footer-actions" id="footerActions" style="display:none">
      <button id="uncheckAll">Uncheck all</button>
      <button id="clearPacked" class="danger">Remove packed</button>
      <button id="clearAll" class="danger">Clear all</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'packing-list-v1';

    let items = load();

    function load() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch { return []; }
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function render() {
      const unpacked = items.filter(i => !i.packed);
      const packed   = items.filter(i =>  i.packed);

      const unpackedList = document.getElementById('unpackedList');
      const packedList   = document.getElementById('packedList');

      unpackedList.innerHTML = '';
      packedList.innerHTML   = '';

      unpacked.forEach(item => unpackedList.appendChild(makeRow(item)));
      packed.forEach(item   => packedList.appendChild(makeRow(item)));

      document.getElementById('unpacked-section').style.display = unpacked.length ? '' : 'none';
      document.getElementById('packed-section').style.display   = packed.length   ? '' : 'none';
      document.getElementById('emptyState').style.display       = items.length    ? 'none' : '';
      document.getElementById('footerActions').style.display    = items.length    ? '' : 'none';

      const total  = items.length;
      const nPacked = packed.length;
      document.getElementById('subtitle').textContent =
        total === 0 ? '0 items' :
        nPacked === total ? `All ${total} packed` :
        `${nPacked} of ${total} packed`;
    }

    function makeRow(item) {
      const div = document.createElement('div');
      div.className = 'item' + (item.packed ? ' packed' : '');

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = item.packed;
      cb.addEventListener('change', () => {
        const found = items.find(i => i.id === item.id);
        if (found) { found.packed = cb.checked; save(); render(); }
      });

      const label = document.createElement('span');
      label.className = 'item-label';
      label.textContent = item.text;
      label.addEventListener('click', () => { cb.checked = !cb.checked; cb.dispatchEvent(new Event('change')); });

      const del = document.createElement('button');
      del.className = 'delete-btn';
      del.textContent = '×';
      del.title = 'Remove';
      del.addEventListener('click', () => {
        items = items.filter(i => i.id !== item.id);
        save(); render();
      });

      div.appendChild(cb);
      div.appendChild(label);
      div.appendChild(del);
      return div;
    }

    document.getElementById('addForm').addEventListener('submit', e => {
      e.preventDefault();
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      if (!text) return;
      items.push({ id: Date.now() + Math.random(), text, packed: false });
      save(); render();
      input.value = '';
      input.focus();
    });

    document.getElementById('uncheckAll').addEventListener('click', () => {
      items.forEach(i => i.packed = false);
      save(); render();
    });

    document.getElementById('clearPacked').addEventListener('click', () => {
      items = items.filter(i => !i.packed);
      save(); render();
    });

    document.getElementById('clearAll').addEventListener('click', () => {
      if (confirm('Clear everything?')) { items = []; save(); render(); }
    });

    render();
  </script>
</body>
</html>
